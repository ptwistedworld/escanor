name: "Basic Reconnaissance"
description: "Initial reconnaissance playbook for gathering target information"
author: "Escanor Team"
created: "2024-01-01"
version: "1.0.0"

steps:
  - module: "reconnaissance/port_scan"
    description: "Scan for open ports"
    options:
      PORTS: "1-1000"
      PROTOCOL: "tcp"
      TIMEOUT: "1"
    enabled: true
    critical: true
    
  - module: "reconnaissance/web_scan"
    description: "Scan web services if found"
    options:
      PORT: "80"
      USE_SSL: "False"
      CHECK_HEADERS: "True"
    enabled: true
    critical: false
    
  - module: "reconnaissance/vuln_scan"
    description: "Check for known vulnerabilities"
    options: {}
    enabled: true
    critical: false
